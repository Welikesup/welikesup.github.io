<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi des ventes</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:#0f0f0f;
color:white;
margin:0;
}

.header{
background:#000;
padding:20px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,0.6);
}

.header img{height:60px;}

.header h1{
margin:10px 0 0 0;
font-weight:600;
font-size:22px;
letter-spacing:1px;
color:#ff7a00;
}

.container{
margin-top:60px;
text-align:center;
padding:10px;
}

input{
padding:8px;
width:80px;
border-radius:8px;
border:none;
margin:4px;
text-align:center;
}

button{
padding:10px 15px;
margin-top:10px;
border:none;
border-radius:8px;
font-weight:600;
cursor:pointer;
max-width:100%;
}

button.validate{background:white;color:black;}
button.cancel{background:#222;color:white;margin-left:8px;}
button.cancel:disabled{opacity:0.3;cursor:not-allowed;}

.hidden{display:none;}

#welcome{
text-align:center;
margin-top:30px;
font-weight:600;
}

#items{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:30px;
}

.item{
background:#ff7a00;
padding:20px;
margin:15px;
border-radius:18px;
width:260px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
transition:0.2s;
}

.item:hover{transform:translateY(-6px);}

.item.glow{
box-shadow:
0 0 10px rgba(30,126,52,0.7),
0 0 20px rgba(30,126,52,0.6),
0 0 30px rgba(30,126,52,0.5);
}

.progress-container{
background:rgba(255,255,255,0.3);
border-radius:20px;
height:20px;
margin-top:10px;
overflow:hidden;
position:relative;
}

.progress-bar{
height:100%;
width:0%;
transition:width 0.5s ease;
position:absolute;
top:0;
left:0;
border-radius:20px;
background:white;
}

.progress-text{
position:relative;
z-index:1;
text-align:center;
width:100%;
line-height:20px;
font-size:12px;
font-weight:600;
}

/* correction ligne ventes */

.personal-line{
font-size:15px;
margin-top:10px;
font-weight:700;
white-space:nowrap;
}

.personal-line strong{
font-size:17px;
}

.admin-panel,
.ranking-panel{
background:#1c1c1c;
padding:20px;
margin:30px;
border-radius:15px;
}

.ranking-row{
display:flex;
justify-content:space-between;
padding:8px;
margin-bottom:6px;
border-radius:8px;
background:rgba(255,255,255,0.05);
}

.ranking-row.top1{background:rgba(255,215,0,0.15);}
.ranking-row.top2{background:rgba(192,192,192,0.15);}
.ranking-row.top3{background:rgba(205,127,50,0.15);}

@media(max-width:768px){

.item{width:90%;}

button{
font-size:18px;
padding:14px;
}

.container{margin-top:40px;}

}

</style>
</head>

<body>

<div class="header">
<img src="logo-stn.png">
<h1>Suivi des ventes</h1>
</div>

<div id="login" class="container">
<h2>Connexion</h2>
<input type="password" id="password" placeholder="Mot de passe">
<br>
<button onclick="login()">Entrer</button>
<p id="error" style="color:red;"></p>
</div>

<div id="app" class="hidden">

<h2 id="welcome"></h2>

<div id="adminPanel" class="admin-panel hidden">
<h3>Administration</h3>
<div id="adminInputs"></div>
<button onclick="saveObjectives()">Valider tous les objectifs</button>
<button onclick="resetWeekly()">Réinitialiser les objectifs</button>
</div>

<div id="rankingPanel" class="ranking-panel hidden">
<h3>Classement du jour</h3>
<div id="rankingContent"></div>
</div>

<div id="items"></div>

</div>

<script type="module">

/* script identique à ta version actuelle */

</script>

</body>
</html>
