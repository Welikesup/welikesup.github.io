<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi des ventes</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background: #0f0f0f;
  color: white;
  margin: 0;
}

.header {
  background: #000;
  padding: 20px;
  text-align: center;
  box-shadow: 0 5px 20px rgba(0,0,0,0.6);
}

.header img { height: 60px; }

.header h1 {
  margin: 10px 0 0 0;
  font-weight: 600;
  font-size: 22px;
  letter-spacing: 1px;
  color: #ff7a00;
}

.container { margin-top: 60px; text-align: center; padding:10px; }

input {
  padding: 8px;
  width: 80px;
  border-radius: 8px;
  border: none;
  margin: 4px;
  text-align: center;
}

button {
  padding: 10px 15px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  max-width:100%;
}

button.validate { background:white; color:black; }
button.cancel { background:#222; color:white; margin-left:8px; }
button.cancel:disabled { opacity:0.3; cursor:not-allowed; }

.hidden { display:none; }

#welcome { text-align: center; margin-top: 30px; font-weight: 600; }

#items {
  display:flex;
  flex-wrap: wrap;
  justify-content:center;
  padding:30px;
}

.item {
  background: #ff7a00;
  padding: 20px;
  margin: 15px;
  border-radius: 18px;
  width: 260px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  transition: 0.2s;
}

.item:hover { transform: translateY(-6px); }

.item.glow {
  box-shadow:
    0 0 10px rgba(30,126,52,0.7),
    0 0 20px rgba(30,126,52,0.6),
    0 0 30px rgba(30,126,52,0.5);
}

.progress-container {
  background: rgba(255,255,255,0.3);
  border-radius: 20px;
  height: 20px;
  margin-top: 10px;
  overflow: hidden;
  position: relative;
}

.progress-bar {
  height: 100%;
  width: 0%;
  transition: width 0.5s ease;
  position: absolute;
  top:0;
  left:0;
  border-radius: 20px;
  background: white;
}

.progress-text {
  position: relative;
  z-index:1;
  text-align:center;
  width:100%;
  line-height:20px;
  font-size:12px;
  font-weight:600;
}

.personal-line { font-size: 14px; margin-top: 10px; }

.admin-panel {
  background:#1c1c1c;
  padding:20px;
  margin:30px;
  border-radius:15px;
}

@media (max-width:768px){
  .item{ width:90%; }
  button{ font-size:18px; padding:14px; }
  .container{ margin-top:40px; }
}
</style>
</head>

<body>

<div class="header">
  <img src="logo-stn.png">
  <h1>Suivi des ventes</h1>
</div>

<div id="login" class="container">
  <h2>Connexion</h2>
  <input type="password" id="password" placeholder="Mot de passe">
  <br>
  <button onclick="login()">Entrer</button>
  <p id="error" style="color:red;"></p>
</div>

<div id="app" class="hidden">
  <h2 id="welcome"></h2>

  <div id="adminPanel" class="admin-panel hidden">
    <h3>Administration</h3>
    <div id="adminInputs"></div>
    <button onclick="saveObjectives()">Valider tous les objectifs</button>
    <button onclick="resetWeekly()">Réinitialiser les objectifs</button>
  </div>

  <div id="items"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA3nNMv12lIJcVrYyldg8dtNeRFKMldAo4",
  authDomain: "compteur-stn.firebaseapp.com",
  projectId: "compteur-stn",
  storageBucket: "compteur-stn.firebasestorage.app",
  messagingSenderId: "661197584248",
  appId: "1:661197584248:web:1dc33900c4422df4c53a8d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const ref = doc(db, "global", "objectifs");

/* Mots de passe hashés SHA-256
   Mots de passe d'origine conservés :
   medine, dembele, johannes, orelsan, lincheneau, riles, secteurstn
*/
const passwords = {
  "afe8313a1e09a01060434b852c5a9679f9b18c9c58672f589dc013600ed353a8":"Le Havre",
  "dbf90070098b8093beb40ecdf86c0d2c219a24cafc12744c38ee52db3387d3e1":"Evreux",
  "1d4b41c9db9172e5f151e4a5fe3c57ca3f98b8e6ba807450b10d1897c84ce72b":"Mondeville",
  "1fdfb74477e81470d893db1862fbe6e13541ed6c4af7dc4bcd69d937adb4a4b5":"Caen",
  "aecfc167335c1252cb0f17429f02bc728aeb76de696050e0df03c5a0a512bf45":"La Glacerie",
  "68521fc55ffa717c695ede130a105c51a0222fc6b7961b4a608addbca974229d":"Rouen",
  "014dbcb988488832f44b00a9ca5c716b6db105b7d766a1c5344d8fe3be8b5067":"Mariama"
};

const allUsers = Object.values(passwords);
const storeUsers = allUsers.filter(name => name !== "Mariama");
const itemsList = ["Broadband","Socle Mobiles","MEV","Terminaux","Assurances","Cyber","MP","Pros"];

let currentUser = "";
let globalData = {};
let cancelTimers = {};
let unsubscribeSnapshot = null;

function getToday(){
  return new Date().toLocaleDateString("fr-CA", { timeZone:"Europe/Paris" });
}

async function hashPassword(password){
  const encoder = new TextEncoder();
  const data = encoder.encode(password);
  const hashBuffer = await crypto.subtle.digest("SHA-256", data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
}

function buildEmptyPersonal(){
  const personal = {};
  allUsers.forEach(userName => {
    personal[userName] = {};
    itemsList.forEach(item => {
      personal[userName][item] = 0;
    });
  });
  return personal;
}

function buildEmptyItemMap(){
  const map = {};
  itemsList.forEach(item => {
    map[item] = 0;
  });
  return map;
}

function computeSectorTotalFromPersonal(personal){
  const sectorTotal = {};
  itemsList.forEach(item => {
    let total = 0;
    storeUsers.forEach(name => {
      total += personal?.[name]?.[item] || 0;
    });
    sectorTotal[item] = total;
  });
  return sectorTotal;
}

async function ensureDataStructure(){
  await runTransaction(db, async (transaction) => {
    const snap = await transaction.get(ref);

    if(!snap.exists()){
      const data = {
        personal: buildEmptyPersonal(),
        initial: buildEmptyItemMap(),
        sectorTotal: buildEmptyItemMap(),
        lastPersonalReset: getToday()
      };

      itemsList.forEach(item => {
        data[item] = 0;
      });

      transaction.set(ref, data);
      return;
    }

    const data = snap.data();
    let patch = {};
    let needsPatch = false;

    const safePersonal = data.personal || {};
    let patchedPersonal = null;
    let personalChanged = false;

    allUsers.forEach(userName => {
      if(!safePersonal[userName]){
        if(!patchedPersonal) patchedPersonal = structuredClone(safePersonal);
        patchedPersonal[userName] = {};
        itemsList.forEach(item => patchedPersonal[userName][item] = 0);
        personalChanged = true;
        return;
      }

      itemsList.forEach(item => {
        if(typeof safePersonal[userName][item] !== "number"){
          if(!patchedPersonal) patchedPersonal = structuredClone(safePersonal);
          if(!patchedPersonal[userName]) patchedPersonal[userName] = {};
          patchedPersonal[userName][item] = 0;
          personalChanged = true;
        }
      });
    });

    if(personalChanged){
      patch.personal = patchedPersonal;
      needsPatch = true;
    }

    const safeInitial = data.initial || {};
    const patchedInitial = { ...safeInitial };
    let initialChanged = false;

    itemsList.forEach(item => {
      if(typeof safeInitial[item] !== "number"){
        patchedInitial[item] = 0;
        initialChanged = true;
      }
    });

    if(initialChanged){
      patch.initial = patchedInitial;
      needsPatch = true;
    }

    const currentPersonal = personalChanged ? patchedPersonal : safePersonal;
    const safeSectorTotal = data.sectorTotal || {};
    const patchedSectorTotal = { ...safeSectorTotal };
    let sectorTotalChanged = false;
    const recomputedSectorTotal = computeSectorTotalFromPersonal(currentPersonal);

    itemsList.forEach(item => {
      if(typeof safeSectorTotal[item] !== "number"){
        patchedSectorTotal[item] = recomputedSectorTotal[item] || 0;
        sectorTotalChanged = true;
      }
    });

    if(sectorTotalChanged){
      patch.sectorTotal = patchedSectorTotal;
      needsPatch = true;
    }

    if(typeof data.lastPersonalReset !== "string"){
      patch.lastPersonalReset = getToday();
      needsPatch = true;
    }

    itemsList.forEach(item => {
      if(typeof data[item] !== "number"){
        patch[item] = 0;
        needsPatch = true;
      }
    });

    if(needsPatch){
      transaction.set(ref, patch, { merge:true });
    }
  });
}

async function resetDailyPersonalIfNeeded(){
  const today = getToday();

  await runTransaction(db, async (transaction) => {
    const snap = await transaction.get(ref);
    if(!snap.exists()) return;

    const data = snap.data();
    if(data.lastPersonalReset === today) return;

    transaction.set(ref, {
      personal: buildEmptyPersonal(),
      lastPersonalReset: today
    }, { merge:true });
  });
}

window.login = async function(){
  const pass = document.getElementById("password").value;
  const hashed = await hashPassword(pass);

  if(!passwords[hashed]){
    document.getElementById("error").innerText = "Mot de passe incorrect";
    return;
  }

  currentUser = passwords[hashed];

  document.getElementById("login").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  document.getElementById("welcome").innerText = "Bienvenue " + currentUser;

  if(currentUser === "Mariama"){
    document.getElementById("adminPanel").classList.remove("hidden");
  }

  await initData();
};

async function initData(){
  await ensureDataStructure();

  if(unsubscribeSnapshot){
    unsubscribeSnapshot();
    unsubscribeSnapshot = null;
  }

  unsubscribeSnapshot = onSnapshot(ref, (docSnap) => {
    globalData = docSnap.data() || {};
    display();
    if(currentUser === "Mariama") renderAdmin();
  });

  await resetDailyPersonalIfNeeded();
}

function display(){
  const container = document.getElementById("items");
  container.innerHTML = "";

  itemsList.forEach(item => {
    const initial = globalData.initial?.[item] ?? 0;
    const cumulativeValue = globalData.sectorTotal?.[item] || 0;

    let todaySectorValue = 0;
    storeUsers.forEach(name => {
      todaySectorValue += globalData.personal?.[name]?.[item] || 0;
    });

    const diff = initial - cumulativeValue;
    const percentBar = Math.min(initial > 0 ? (cumulativeValue / initial) * 100 : 0, 100);
    const percentText = initial > 0 ? (cumulativeValue / initial) * 100 : 0;

    let percentColor = "#ff7a00";
    if(percentText >= 100 && percentText < 120) percentColor = "#66cc88";
    if(percentText >= 120) percentColor = "#1e7e34";

    const userValue = (currentUser === "Mariama")
      ? todaySectorValue
      : (globalData.personal?.[currentUser]?.[item] || 0);

    const personalText = (currentUser === "Mariama")
      ? "Ventes du secteur aujourd'hui"
      : "Ventes de la boutique aujourd'hui";

    let detailHTML = "";
    if(currentUser === "Mariama"){
      storeUsers.forEach(name => {
        const val = globalData.personal?.[name]?.[item] || 0;
        detailHTML += `<div style="font-size:12px">${name} : ${val}</div>`;
      });
    }

    let leaderName = "";
    let leaderValue = -1;

    storeUsers.forEach(name => {
      const val = globalData.personal?.[name]?.[item] || 0;
      if(val > leaderValue){
        leaderValue = val;
        leaderName = name;
      }
    });

    let leaderHTML = "";
    if(currentUser === "Mariama"){
      if(leaderValue > 0){
        leaderHTML = `<div style="font-size:13px; margin-top:8px; font-weight:600;">Boutique leader : ${leaderName} (${leaderValue})</div>`;
      } else {
        leaderHTML = `<div style="font-size:13px; margin-top:8px; font-weight:600;">Boutique leader : aucune vente</div>`;
      }
    }

    const cancelAllowed = !!(cancelTimers[item] && Date.now() < cancelTimers[item]);
    const canSell = currentUser !== "Mariama";

    const div = document.createElement("div");
    div.className = "item";

    if(percentText >= 120){
      div.style.background = "#1e7e34";
      div.classList.add("glow");
    } else if(percentText >= 100){
      div.style.background = "#66cc88";
    } else {
      div.style.background = "#ff7a00";
    }

    const objectifText = diff >= 0
      ? `Objectif restant : <strong>${diff}</strong>`
      : `Objectif dépassé de : <strong>${-diff}</strong>`;

    div.innerHTML = `
      <h3>${item}</h3>
      <p>${objectifText}</p>

      <div class="progress-container">
        <div class="progress-bar" style="width:${percentBar}%"></div>
        <div class="progress-text" style="color:${percentColor}">${percentText.toFixed(0)}%</div>
      </div>

      <div class="personal-line">
        ${personalText} : <strong>${userValue}</strong>
      </div>

      ${detailHTML}
      ${leaderHTML}

      ${canSell ? `
        <button class="validate" onclick="decrement('${item}')">Valider une vente</button>
        <button class="cancel" ${!cancelAllowed ? "disabled" : ""} onclick="cancelSale('${item}')">Annuler</button>
      ` : ""}
    `;

    container.appendChild(div);
  });
}

window.decrement = async function(item){
  if(currentUser === "Mariama") return;
  if(!confirm("Confirmer cette vente ?")) return;

  cancelTimers[item] = Date.now() + 20000;

  await runTransaction(db, async (transaction) => {
    const snap = await transaction.get(ref);
    if(!snap.exists()) return;

    const data = snap.data();
    const currentPersonal = data.personal || {};
    const currentSectorTotal = data.sectorTotal || {};

    const userItemValue = currentPersonal?.[currentUser]?.[item] || 0;
    const sectorItemValue = currentSectorTotal?.[item] || 0;

    transaction.set(ref, {
      personal: {
        ...currentPersonal,
        [currentUser]: {
          ...(currentPersonal[currentUser] || {}),
          [item]: userItemValue + 1
        }
      },
      sectorTotal: {
        ...currentSectorTotal,
        [item]: sectorItemValue + 1
      }
    }, { merge:true });
  });
};

window.cancelSale = async function(item){
  if(currentUser === "Mariama") return;
  if(!cancelTimers[item] || Date.now() > cancelTimers[item]) return;

  await runTransaction(db, async (transaction) => {
    const snap = await transaction.get(ref);
    if(!snap.exists()) return;

    const data = snap.data();
    const currentPersonal = data.personal || {};
    const currentSectorTotal = data.sectorTotal || {};

    const userItemValue = currentPersonal?.[currentUser]?.[item] || 0;
    const sectorItemValue = currentSectorTotal?.[item] || 0;

    transaction.set(ref, {
      personal: {
        ...currentPersonal,
        [currentUser]: {
          ...(currentPersonal[currentUser] || {}),
          [item]: Math.max(userItemValue - 1, 0)
        }
      },
      sectorTotal: {
        ...currentSectorTotal,
        [item]: Math.max(sectorItemValue - 1, 0)
      }
    }, { merge:true });
  });

  cancelTimers[item] = null;
};

function renderAdmin(){
  const div = document.getElementById("adminInputs");
  div.innerHTML = "";

  itemsList.forEach(item => {
    div.innerHTML += `
      <div>
        ${item} :
        <input type="number" id="obj-${item}" value="${globalData[item] || 0}">
      </div>
    `;
  });
}

window.saveObjectives = async function(){
  if(!confirm("Valider les nouveaux objectifs ?")) return;

  let update = {};
  let initial = { ...(globalData.initial || {}) };

  itemsList.forEach(item => {
    const val = parseInt(document.getElementById("obj-" + item).value) || 0;
    update[item] = val;
    initial[item] = val;
  });

  await setDoc(ref, {
    ...update,
    initial: initial
  }, { merge:true });
};

window.resetWeekly = async function(){
  if(!confirm("Réinitialiser tous les objectifs ?")) return;

  await runTransaction(db, async (transaction) => {
    const snap = await transaction.get(ref);
    if(!snap.exists()) return;

    const data = snap.data();
    const currentInitial = data.initial || {};
    const currentSectorTotal = data.sectorTotal || {};

    const topLevelReset = {};
    const initialReset = { ...currentInitial };
    const sectorTotalReset = { ...currentSectorTotal };

    itemsList.forEach(item => {
      topLevelReset[item] = 0;
      initialReset[item] = 0;
      sectorTotalReset[item] = 0;
    });

    transaction.set(ref, {
      ...topLevelReset,
      initial: initialReset,
      sectorTotal: sectorTotalReset
    }, { merge:true });
  });
};
</script>
</body>
</html>
