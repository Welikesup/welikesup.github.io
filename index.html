<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Suivi des ventes</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background: #0f0f0f;
  color: white;
  margin: 0;
}

.header {
  background: #000;
  padding: 20px;
  text-align: center;
  box-shadow: 0 5px 20px rgba(0,0,0,0.6);
}

.header img { height: 60px; }

.header h1 {
  margin: 10px 0 0 0;
  font-weight: 600;
  font-size: 22px;
  letter-spacing: 1px;
  color: #ff7a00;
}

.container { margin-top: 60px; text-align: center; }

input {
  padding: 8px;
  width: 80px;
  border-radius: 8px;
  border: none;
  margin: 4px;
  text-align: center;
}

button {
  padding: 10px 15px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
}

button:not(.disabled) { background: #ff7a00; color: white; }
button.disabled { background: #444; color: #999; cursor: not-allowed; }

.hidden { display:none; }

#welcome { text-align: center; margin-top: 30px; font-weight: 600; }

#items {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  padding: 30px;
}

.item {
  background: #ff7a00;
  padding: 20px;
  margin: 15px;
  border-radius: 18px;
  width: 260px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  transition: 0.2s;
}

.item:hover { transform: translateY(-6px); }

.item.success { background: #1e7e34; }

.progress-container {
  background: rgba(255,255,255,0.3);
  border-radius: 20px;
  height: 10px;
  margin-top: 10px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  background: white;
  width: 0%;
  transition: width 0.5s ease;
}

.item.success .progress-bar { background: #00ff88; }

.personal-line { font-size: 14px; margin-top: 10px; }

.admin-panel {
  background:#1c1c1c;
  padding:20px;
  margin:30px;
  border-radius:15px;
}

@media (max-width: 768px) {
  .item { width: 90%; }
}
</style>
</head>
<body>

<div class="header">
  <img src="logo-stn.png">
  <h1>Suivi des ventes</h1>
</div>

<div id="login" class="container">
<h2>Connexion</h2>
<input type="password" id="password" placeholder="Mot de passe">
<br>
<button onclick="login()">Entrer</button>
<p id="error" style="color:red;"></p>
</div>

<div id="app" class="hidden">
<h2 id="welcome"></h2>

<div id="adminPanel" class="admin-panel hidden">
<h3>Administration</h3>
<div id="adminInputs"></div>
<button onclick="saveObjectives()">Valider tous les objectifs</button>
<button onclick="resetWeekly()">Reset hebdo objectifs</button>
</div>

<div id="items"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA3nNMv12lIJcVrYyldg8dtNeRFKMldAo4",
  authDomain: "compteur-stn.firebaseapp.com",
  projectId: "compteur-stn",
  storageBucket: "compteur-stn.firebasestorage.app",
  messagingSenderId: "661197584248",
  appId: "1:661197584248:web:1dc33900c4422df4c53a8d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const ref = doc(db, "global", "objectifs");

const passwords = {
  "medine":"Le Havre",
  "dembele":"Evreux",
  "johannes":"Mondeville",
  "orelsan":"Caen",
  "lincheneau":"La Glacerie",
  "riles":"Rouen",
  "secteurstn":"Mariama"
};

const itemsList = ["Broadband","Socle Mobiles","MEV","Terminaux","Assurances","Cyber","MP","Pros"];

let currentUser="";
let globalData={};
let initialObjectives={};

function getToday(){
  const d=new Date();
  return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
}

window.login=async function(){
  const pass=document.getElementById("password").value;
  if(passwords[pass]){
    currentUser=passwords[pass];
    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("welcome").innerText="Bienvenue "+currentUser;

    if(currentUser==="Mariama"){
      document.getElementById("adminPanel").classList.remove("hidden");
    }

    await initData();
  }else{
    document.getElementById("error").innerText="Mot de passe incorrect";
  }
}

async function initData(){
  const snap=await getDoc(ref);
  if(!snap.exists()){
    let data={personal:{},lastPersonalReset:getToday()};
    itemsList.forEach(i=>data[i]=0);
    Object.values(passwords).forEach(u=>{
      data.personal[u]={};
      itemsList.forEach(i=>data.personal[u][i]=0);
    });
    await setDoc(ref,data);
  }

  await checkDailyReset();

  onSnapshot(ref,(docSnap)=>{
    globalData=docSnap.data();
    itemsList.forEach(i=>{
      if(initialObjectives[i]===undefined){
        initialObjectives[i]=globalData[i];
      }
    });
    display();
    if(currentUser==="Mariama") renderAdmin();
  });
}

async function checkDailyReset(){
  const snap=await getDoc(ref);
  const data=snap.data();
  if(data.lastPersonalReset!==getToday()){
    let resetPersonal={};
    Object.values(passwords).forEach(u=>{
      resetPersonal[u]={};
      itemsList.forEach(i=>resetPersonal[u][i]=0);
    });
    await setDoc(ref,{personal:resetPersonal,lastPersonalReset:getToday()},{merge:true});
  }
}

function display(){
  const container=document.getElementById("items");
  container.innerHTML="";

  itemsList.forEach(item=>{
    const remaining=globalData[item]||0;
    const initial=initialObjectives[item]||remaining;
    const percent=initial>0?((initial-remaining)/initial)*100:100;
    const personalValue=globalData.personal?.[currentUser]?.[item]||0;

    const div=document.createElement("div");
    div.className="item";
    if(remaining===0) div.classList.add("success");

    div.innerHTML=`
      <h3>${item}</h3>
      <p>Objectif restant: <strong>${remaining}</strong></p>
      <div class="progress-container">
        <div class="progress-bar" style="width:${percent}%"></div>
      </div>
      <div class="personal-line">
        Mes ventes aujourd'hui : <strong>${personalValue}</strong>
      </div>
      <button ${remaining===0?"class='disabled' disabled":""}
        onclick="decrement('${item}')">
        ${remaining===0?"Objectif atteint":"Valider une vente"}
      </button>
    `;
    container.appendChild(div);
  });
}

window.decrement=async function(item){
  if(globalData[item]<=0) return;
  const personalValue=globalData.personal[currentUser][item]||0;

  await setDoc(ref,{
    [item]:globalData[item]-1,
    personal:{
      ...globalData.personal,
      [currentUser]:{
        ...globalData.personal[currentUser],
        [item]:personalValue+1
      }
    }
  },{merge:true});
}

function renderAdmin(){
  const div=document.getElementById("adminInputs");
  div.innerHTML="";
  itemsList.forEach(item=>{
    div.innerHTML+=`
      <div>
        ${item} :
        <input type="number" id="obj-${item}" value="${globalData[item]||0}">
      </div>
    `;
  });
}

window.saveObjectives=async function(){
  let update={};
  itemsList.forEach(item=>{
    update[item]=parseInt(document.getElementById("obj-"+item).value)||0;
    initialObjectives[item]=update[item];
  });
  await setDoc(ref,update,{merge:true});
}

window.resetWeekly=async function(){
  if(!confirm("Reset hebdomadaire des objectifs ?")) return;
  let reset={};
  itemsList.forEach(item=>{
    reset[item]=initialObjectives[item]||0;
  });
  await setDoc(ref,reset,{merge:true});
}
</script>
</body>
</html>
