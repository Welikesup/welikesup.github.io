<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Suivi KPI</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
padding:10px;
}

h1{
text-align:center;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
max-width:1200px;
margin:auto;
}

.card{
background:white;
border-radius:10px;
padding:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
text-align:center;
}

.kpi{
font-size:28px;
margin:10px 0;
}

button{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.validate{
background:#4CAF50;
color:white;
}

.cancel{
background:#f44336;
color:white;
}

.reset{
background:#555;
color:white;
margin-top:10px;
}

button:disabled{
opacity:0.4;
cursor:not-allowed;
}

@media (max-width:768px){

h1{
font-size:22px;
}

button{
font-size:18px;
padding:14px;
}

}

</style>

</head>

<body>

<h1>Suivi des ventes</h1>

<div class="container">

<div class="card">
<h2>Mariama</h2>

<div>KPI 1</div>
<div class="kpi" id="mariama_kpi1">0</div>

<button class="validate" onclick="validateSale('mariama','kpi1')">Valider</button>
<button class="cancel" id="cancel_mariama_kpi1" onclick="cancelSale('mariama','kpi1')" disabled>Annuler</button>

<hr>

<div>KPI 2</div>
<div class="kpi" id="mariama_kpi2">0</div>

<button class="validate" onclick="validateSale('mariama','kpi2')">Valider</button>
<button class="cancel" id="cancel_mariama_kpi2" onclick="cancelSale('mariama','kpi2')" disabled>Annuler</button>

<button class="reset" onclick="resetProfile('mariama')">Réinitialiser</button>

</div>

</div>

<script>

let data={
mariama:{
kpi1:0,
kpi2:0
}
}

let timers={}

function validateSale(user,kpi){

data[user][kpi]++

updateDisplay(user,kpi)

let cancelBtn=document.getElementById("cancel_"+user+"_"+kpi)

cancelBtn.disabled=false

clearTimeout(timers[user+"_"+kpi])

timers[user+"_"+kpi]=setTimeout(()=>{

cancelBtn.disabled=true

},20000)

}

function cancelSale(user,kpi){

if(data[user][kpi]>0){

data[user][kpi]--

updateDisplay(user,kpi)

}

document.getElementById("cancel_"+user+"_"+kpi).disabled=true

}

function updateDisplay(user,kpi){

document.getElementById(user+"_"+kpi).innerText=data[user][kpi]

}

function resetProfile(user){

for(let kpi in data[user]){

data[user][kpi]=0

updateDisplay(user,kpi)

document.getElementById("cancel_"+user+"_"+kpi).disabled=true

}

}

</script>

</body>
</html>
